# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: detect-private-key
-   repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.23.0"
    hooks:
    -   id: pyproject-fmt
-   repo: https://github.com/citation-file-format/cffconvert
    rev: b6045d78aac9e02b039703b030588d54d53262ac
    hooks:
    -   id: validate-cff
-   repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
    -   id: codespell
        exclude: |
          (?x)^(
              .*\.lock |
              .*\.csv |
              .*\.cff |
              .*\.ipynb
          )$
-   repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
    -   id: mdformat
        additional_dependencies:
        -   mdformat-gfm
-   repo: https://github.com/CU-DBMI/onesentence
    rev: 3161573091c3868c01c9d3ae5f549e5c38aa5eb3
    hooks:
    -   id: check
        types: [markdown]
        exclude: |
          (?x)^(
              CODE_OF_CONDUCT\.md |
              zenodo-release-drift-roadmap\.md |
              \.agents/.*
          )$
-   repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
    -   id: yamllint
        exclude: pre-commit-config.yaml
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.15"
    hooks:
    -   id: ruff-format
    -   id: ruff-check
-   repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
    -   id: actionlint
-   repo: https://github.com/jendrikseipp/vulture
    rev: 'v2.16'
    hooks:
    -   id: vulture
-   repo: local
    hooks:
    -   id: ty
        name: ty
        entry: uv run --frozen --with ty ty check --ignore unresolved-import
        language: system
        files: ^(src|tests)/.*\.py$
        exclude: ^src/zenodo_release_drift/_version\.py$
